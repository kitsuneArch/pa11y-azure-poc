name: Trigger auto deployment for pa11y-dashboard

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/pa11y-dashboard-AutoDeployTrigger-aa9fa98d-9c89-4056-aa09-c84d706d8833.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PA11YDASHBOARD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PA11YDASHBOARD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PA11YDASHBOARD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.PA11YDASHBOARD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PA11YDASHBOARD_REGISTRY_PASSWORD }}
          containerAppName: pa11y-dashboard
          resourceGroup: pa11y-poc-rg
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


